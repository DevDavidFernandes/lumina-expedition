<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <style>
      .outer { fill: #0a0f1e; stroke: #4fc3f7; stroke-width: 0.8; }
      .mid   { fill: #0d1b2e; stroke: #81d4fa; stroke-width: 0.6; }
      .inner { fill: #1a2e4a; stroke: #b3e5fc; stroke-width: 0.5; }
      .core  { fill: #e8f4fd; stroke: #ffffff; stroke-width: 0.3; }
      .facet { fill: none; stroke: #4fc3f7; stroke-width: 0.4; opacity: 0.5; }
      .glow  { fill: none; stroke: #b3e5fc; stroke-width: 0.5; opacity: 0.6; }
    </style>
  </defs>

  <!-- Diamante externo -->
  <polygon class="outer" points="50,4  96,50  50,96  4,50"/>

  <!-- Facetas externas -->
  <line class="facet" x1="50" y1="4"  x2="50" y2="96"/>
  <line class="facet" x1="4"  y1="50" x2="96" y2="50"/>
  <line class="facet" x1="50" y1="4"  x2="78" y2="78"/>
  <line class="facet" x1="50" y1="4"  x2="22" y2="78"/>

  <!-- Diamante intermediário -->
  <polygon class="mid" points="50,18  82,50  50,82  18,50"/>

  <!-- Linhas internas -->
  <line class="glow" x1="50" y1="18" x2="50" y2="82"/>
  <line class="glow" x1="18" y1="50" x2="82" y2="50"/>
  <line class="glow" x1="50" y1="18" x2="70" y2="70"/>
  <line class="glow" x1="50" y1="18" x2="30" y2="70"/>

  <!-- Diamante interno -->
  <polygon class="inner" points="50,33  67,50  50,67  33,50"/>

  <!-- Núcleo -->
  <polygon class="core" points="50,41  59,50  50,59  41,50"/>

  <!-- Ponto central -->
  <circle cx="50" cy="50" r="4" fill="#ffffff" opacity="0.95"/>
  <circle cx="50" cy="50" r="2" fill="#ffffff"/>
</svg>
