<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumina</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="../assets/icon/favicon (2).svg"
    />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/landing.css" />
    <link rel="stylesheet" href="../css/login.css" />
  </head>
  <body>
    <!-- ================= -->
    <!-- ==== Petalas ==== -->

    <canvas id="particleCanvas"></canvas>

    <main>
      <section class="login">
        <div class="login-card">
          <!-- ==== BOTÃO VOLTAR ==== -->
          <a href="../index.html" class="btn-back"
            ><i class="fa-solid fa-chevron-left"></i
          ></a>
          <!-- ==== CARD VOLTAR ==== -->

          <h1>LUMINA</h1>
          <p>A Expedição Começa em Você</p>
          <div class="landing__divider">
            <div class="divider-line"></div>
            <span class="landing__diamond">♦</span>
            <div class="divider-line"></div>
          </div>
          <!-- ==== FORMULÁRIO ==== -->
          <form action="">
            <label for="email">E-mail:</label>
            <input type="email" placeholder="seu@email.com" />
            <label for="password">Senha:</label>
            <input type="password" placeholder="********" />
            <button>ENTRAR NA EXPEDIÇÃO</button>
          </form>
          <div class="landing__divider">
            <div class="divider-line"></div>
            <span class="landing__diamond">♦</span>
            <div class="divider-line"></div>
          </div>
          <!-- ==== CADASTRO ==== -->
          <p>Novo expedicionário?<a href="register.html">Cadastre-se</a></p>
        </div>
      </section>
    </main>

    <script src="../js/particles.js"></script>
  </body>
</html>
