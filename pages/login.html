<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumina</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link rel="icon" type="image/svg+xml" href="assets/icon/favicon (2).svg" />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/landing.css" />
    <link rel="stylesheet" href="../css/login.css" />
  </head>
  <body>
    <!-- ================= -->
    <!-- ==== Petalas ==== -->

    <canvas id="particleCanvas"></canvas>

    <main>
      <section class="login">
        <!-- ==== BOTÃO VOLTAR ==== -->
        <a href="../index.html"
          ><i class="fa-solid fa-arrow-left" style="color: rgb(0, 0, 0)"></i>
          Voltar</a
        >
        <!-- ==== CARD VOLTAR ==== -->
        <div class="login-card">
          <h1>LUMINA</h1>
          <p>A Expedição Começa em Você</p>
          <div class="landing__divider">
            <div class="divider-line"></div>
            <span class="landing__diamond">♦</span>
            <div class="divider-line"></div>
          </div>
          <!-- ==== FORMULÁRIO ==== -->
          <form action="">
            <input type="email" />
            <input type="password" />
            <button>ENTRAR NA EXPEDIÇÃO</button>
          </form>
          <div class="landing__divider">
            <div class="divider-line"></div>
            <span class="landing__diamond">♦</span>
            <div class="divider-line"></div>
          </div>
          <!-- ==== CADASTRO ==== -->
          <p>Novo expedicionário?<a href="register.html">Cadastre-se</a></p>
        </div>
      </section>
    </main>

    <script src="../js/particles.js"></script>
  </body>
</html>
