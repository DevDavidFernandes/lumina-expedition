<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumina</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/landing.css" />
  </head>
  <body>
    <!-- ==== PETALAS E POEIRA DE FUNDO ==== -->
    <canvas id="particleCanvas"></canvas>

    <!-- ==== COMEÇO DA LAND PAGE ==== -->
    <main class="landing">
      <header class="landing__eyebrow">
        <div class="eyebrow-line"></div>
        <span>♦</span>
        <span>EXPEDIÇÃO · CRESCIMENTO · LUMINA</span>
        <span>♦</span>
        <div class="eyebrow-line"></div>
      </header>

      <!-- ==== TÍTULO E HERO ==== -->
      <section class="landing__hero">
        <h1 class="landing__title">LUMINA</h1>
        <p class="landing__subtitle">A Expedição Começa em Você</p>
        <div class="landing__divider">
          <div class="divider-line"></div>
          <span class="landing__diamond">♦</span>
          <div class="divider-line"></div>
        </div>
        <p class="landing__description">
          Transforme sua jornada de desenvolvimento pessoal em uma expedição
          épica. Complete missões, cultive hábitos e registre cada passo da sua
          evolução.
        </p>
      </section>

      <!-- ==== BOTÕES DE AÇÃO ==== -->
      <div class="landing__cta">
        <button class="btn btn--primary">&#x1F6E1; Iniciar Jornada</button>
        <button class="btn btn--ghost">Já tenho conta</button>
      </div>

      <!-- ==== SEÇÃO SOBRE ==== -->
      <section class="about">
        <div class="about-container">
          <!-- ==== TITULO ==== -->
          <div class="about-title">
            <h1>Pilares da Expedição</h1>
          </div>

          <!-- ==== LINHA ===== -->
          <div class="divider-line"></div>
          <span class="landing__diamond">♦</span>
          <div class="divider-line"></div>

          <!-- ==== CARDS ==== -->
          <div class="about-cards">
            <div class="card card-1">
              <div class="card-icon"></div>
              <h2></h2>
              <p></p>
            </div>
            <div class="card card-2">
              <div class="card-icon"></div>
              <h2></h2>
              <p></p>
            </div>
            <div class="card card-3">
              <div class="card-icon"></div>
              <h2></h2>
              <p></p>
            </div>
          </div>

          <!-- ==== PROGRESSÃO ==== -->
          <div class="about-description">
            <div class="description-icon"></div>
            <h2></h2>
            <p></p>
            <p class="xp"></p>
          </div>
        </div>
      </section>
    </main>

    <script src="js/particles.js"></script>
  </body>
</html>
